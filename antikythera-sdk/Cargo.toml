[package]
name = "antikythera-sdk"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "High-level API wrapper with FFI and WASM bindings"

[lib]
# cdylib: required for server-side WASM component builds (wasm32-wasip1)
#         and native C FFI (--features ffi).
# rlib:   required for native Rust builds and tests.
crate-type = ["cdylib", "rlib"]

[package.metadata.component]
package = "antikythera:mcp-framework"

[package.metadata.component.dependencies]

[features]
# Default build: native Rust with single-agent support.
# Browser WASM (`wasm`) and server-side WASM component (`component`) are
# explicit opt-in lanes and must not be enabled implicitly by default.
default = ["single-agent"]

# Shared runtime surface for SDK features that depend on core/session crates.
# Also enables `http-providers` in core: sdk-core is only active for native
# builds, never for server-side WASM component builds, so it is safe to
# include HTTP client code here.
sdk-core = ["dep:antikythera-core", "dep:antikythera-session", "antikythera-core/http-providers"]

# Browser WASM bindings (wasm-bindgen / JS interop).
# Target: wasm32-unknown-unknown.
# NOTE: This is NOT the primary WASM target. The framework is designed for
# server-side WASM (wasm32-wasip1 component model). This feature exists for
# optional browser embedding only and is NOT aligned with the WIT/wasmtime
# integration path.
wasm = ["sdk-core", "dep:wasm-bindgen", "dep:wasm-bindgen-futures", "dep:js-sys", "dep:console_error_panic_hook", "dep:tracing-wasm"]

# Server-side WASM Component Model support (wasm32-wasip1 WASI).
# This is the primary WASM target: the .wasm binary is hosted by a native
# process (Rust/Python/Go/etc.) that embeds wasmtime and calls exports via FFI.
# Host imports (call_llm_sync, etc.) are declared in wit/antikythera.wit.
component = ["dep:wit-bindgen-rt"]

# WASM configuration binary format (postcard serialization)
wasm-config = []

# FFI support for C bindings
ffi = ["sdk-core", "dep:ffi-support"]

# Agent modes - these control what antikythera-core includes
single-agent = ["sdk-core", "antikythera-core/native-transport"]
multi-agent = ["sdk-core", "antikythera-core/multi-agent"]

# Optional capabilities
wasm-sandbox = ["sdk-core", "antikythera-core/wasm-runtime"]

# Full-featured build (not recommended for WASM - large binary)
full = ["wasm", "multi-agent", "antikythera-core/full"]

[dependencies]
# Core with configurable features - SDK enables what it needs through feature wiring
antikythera-core = { path = "../antikythera-core", version = "0.9.6", default-features = false, optional = true }

# Logging
antikythera-log = { path = "../antikythera-log", version = "0.9.6", features = ["subscriber"] }

# Session management
antikythera-session = { path = "../antikythera-session", version = "0.9.6", optional = true }

# Core async runtime (wasm-compatible)
tokio = { version = "1.39", default-features = false, features = ["macros", "rt"] }
futures = "0.3.32"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
postcard = { version = "1.0", features = ["alloc"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling and logging
thiserror = "2.0.17"
tracing = "0.1"
async-trait = "0.1"

# WASM support (optional)
wasm-bindgen = { version = "0.2", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
js-sys = { version = "0.3", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
tracing-wasm = { version = "0.2", optional = true }

# WASM Component Model
witgen = "0.5"
wit-bindgen = "0.37"
wit-bindgen-rt = { version = "0.37", features = ["bitflags"], optional = true }

# FFI support (optional)
ffi-support = { version = "0.4", optional = true }

[dev-dependencies]
tokio = { version = "1.39", features = ["macros", "rt-multi-thread", "test-util"] }
serial_test = "3.0"

# Taskfile for Antikythera MCP Framework
# Usage: task <task-name>
# Docs: https://taskfile.dev

version: '3'

silent: true

dotenv:
  - config/.env

vars:
  WASM_TARGET: wasm32-wasip1
  WASM_BINARY: target/{{.WASM_TARGET}}/release/antikythera_sdk.wasm
  APP_CONFIG: app.pc
  PROVIDER_ID: '{{default "local-ollama" .PROVIDER_ID}}'
  PROVIDER_TYPE: '{{default "ollama" .PROVIDER_TYPE}}'
  PROVIDER_ENDPOINT: '{{default "http://127.0.0.1:11434" .PROVIDER_ENDPOINT}}'
  PROVIDER_API_KEY: '{{default "" .PROVIDER_API_KEY}}'
  MODEL_NAME: '{{default "llama3.2" .MODEL_NAME}}'

tasks:

  # ===========================================================================
  # Default Task - Show Help
  # ===========================================================================
  default:
    desc: Show available tasks
    cmds:
      - |
        echo "Antikythera MCP Framework - Available Tasks"
        echo ""
        echo "  task run           - Run interactive TUI CLI with auto-bootstrap config"
        echo "  task run-wasm      - Run CLI as WASM FFI host harness"
        echo "  task run-interactive - Run interactive CLI (stdio mode)"
        echo "  task run-tui       - Alias for interactive TUI-friendly CLI"
        echo "  task setup-config  - Setup app.pc with selectable provider"
        echo "  task build         - Build WASM component"
        echo "  task build-wasm-harness - Build WASM artifact for FFI host harness"
        echo "  task build-all     - Build all WASM artifacts"
        echo "  task wit           - Generate WIT from Rust code"
        echo "  task clean         - Clean all build artifacts"
        echo "  task clean-wasm    - Clean WASM build artifacts"
        echo "  task check         - Check code without building"
        echo "  task check-wasm    - Check WASM compilation"
        echo "  task test          - Run all tests"
        echo "  task test-cli-wasm-host - Run CLI host-FFI WASM smoke test"
        echo "  task test-sdk      - Run SDK tests"
        echo "  task test-ffi      - Run FFI tests"
        echo "  task test-component - Run component tests"
        echo "  task lint          - Run clippy linter"
        echo "  task format        - Format code with rustfmt"
        echo "  task inspect       - Inspect WASM component"
        echo "  task size          - Show binary sizes"
        echo ""

  # ===========================================================================
  # Build Tasks
  # ===========================================================================

  build:
    desc: Build WASM component
    deps:
      - wit
    cmds:
      - echo "Building WASM component..."
      - cargo component build --target {{.WASM_TARGET}} --release
      - echo ""
      - 'echo "OK WASM component built: {{.WASM_BINARY}}"'
      - task: size

  build-wasm-harness:
    desc: Build WASM artifact for CLI harness (component lane)
    deps:
      - wit
    cmds:
      - echo "Building WASM harness artifact..."
      - cargo component build -p antikythera-sdk --target {{.WASM_TARGET}} --release --no-default-features --features component
      - echo ""
      - 'echo "OK WASM harness artifact built: {{.WASM_BINARY}}"'
      - task: size

  build-all:
    desc: Build all WASM artifacts
    cmds:
      - task: build
      - task: build-wasm-harness

  wit:
    desc: Generate WIT from Rust code
    cmds:
      - echo "Generating WIT from Rust code..."
      - cargo run -p build-scripts --release -- wit

  # ===========================================================================
  # Run Tasks
  # ===========================================================================

  ensure-config:
    internal: true
    desc: Ensure app.pc exists with seeded provider defaults
    cmds:
      - |
        if [ ! -f "{{.APP_CONFIG}}" ]; then
          echo "Config {{.APP_CONFIG}} not found, creating default multi-provider config..."
          cargo run -p antikythera-cli --bin antikythera-config -- init
        fi

  run:
    desc: Run interactive TUI CLI (default run path)
    deps:
      - ensure-config
    cmds:
      - echo "Running interactive TUI CLI..."
      - 'cargo run -p antikythera-cli --bin antikythera -- --mode stdio {{.CLI_ARGS}}'

  run-wasm:
    desc: Run CLI as WASM FFI host harness
    deps:
      - build-wasm-harness
    vars:
      WASM_TASK: '{{default "WASM harness smoke test" .WASM_TASK}}'
    cmds:
      - echo "Running CLI as WASM FFI host harness..."
      - 'cargo run -p antikythera-cli --bin antikythera -- --mode wasm-harness --wasm {{.WASM_BINARY}} --task "{{.WASM_TASK}}" --stream {{.CLI_ARGS}}'

  run-interactive:
    desc: Run interactive CLI (stdio mode)
    deps:
      - ensure-config
    cmds:
      - task: run CLI_ARGS='{{.CLI_ARGS}}'

  run-tui:
    desc: Alias of run-interactive (TUI-friendly)
    cmds:
      - task: run-interactive

  setup-config:
    desc: Setup app.pc with selectable provider/model parameters
    deps:
      - wit
    cmds:
      - echo "Setting up configuration..."
      - cargo run -p antikythera-cli --bin antikythera-config -- init || true
      - |
        if [ -n "{{.PROVIDER_API_KEY}}" ]; then
          cargo run -p antikythera-cli --bin antikythera-config -- add-provider {{.PROVIDER_ID}} {{.PROVIDER_TYPE}} {{.PROVIDER_ENDPOINT}} {{.PROVIDER_API_KEY}}
        else
          cargo run -p antikythera-cli --bin antikythera-config -- add-provider {{.PROVIDER_ID}} {{.PROVIDER_TYPE}} {{.PROVIDER_ENDPOINT}}
        fi
      - cargo run -p antikythera-cli --bin antikythera-config -- set-model {{.PROVIDER_ID}} {{.MODEL_NAME}}
      - cargo run -p antikythera-cli --bin antikythera-config -- status

  # ===========================================================================
  # Test Tasks
  # ===========================================================================

  test:
    desc: Run all tests
    deps:
      - wit
    cmds:
      - echo "Running all tests..."
      - cargo test --workspace
      - task: test-cli-wasm-host
      - echo ""
      - echo "✓ All tests passed"

  test-cli-wasm-host:
    desc: Run CLI host-FFI integration smoke test against built WASM artifact
    deps:
      - build-wasm-harness
    cmds:
      - echo "Running CLI host-FFI WASM smoke test..."
      - 'cargo run -p antikythera-cli --bin antikythera -- --mode wasm-harness --wasm {{.WASM_BINARY}} --task "CLI host-FFI smoke test" --wasm-llm-response "{\"content\":\"cli-ffi-ok\",\"model\":\"harness\"}" --stream'
      - echo ""
      - echo "✓ CLI host-FFI WASM smoke test passed"

  test-sdk:
    desc: Run SDK tests
    cmds:
      - echo "Running SDK tests..."
      - cargo test -p antikythera-sdk --lib
      - echo ""
      - echo "✓ SDK tests passed"

  test-ffi:
    desc: Run FFI tests
    cmds:
      - echo "Running FFI tests..."
      - cargo test -p antikythera-sdk --lib ffi
      - echo ""
      - echo "✓ FFI tests passed"

  test-component:
    desc: Run component tests
    cmds:
      - echo "Running component tests..."
      - cargo test -p antikythera-sdk --lib component
      - echo ""
      - echo "✓ Component tests passed"

  # ===========================================================================
  # Check Tasks
  # ===========================================================================

  check:
    desc: Check code without building
    deps:
      - wit
    cmds:
      - echo "Checking code..."
      - cargo check --workspace
      - echo ""
      - echo "✓ Code check passed"

  check-wasm:
    desc: Check WASM compilation
    deps:
      - wit
    cmds:
      - echo "Checking WASM compilation..."
      - cargo check -p antikythera-sdk --target {{.WASM_TARGET}}
      - echo ""
      - echo "✓ WASM check passed"

  # ===========================================================================
  # Clean Tasks
  # ===========================================================================

  clean:
    desc: Clean all build artifacts
    cmds:
      - echo "Cleaning all build artifacts..."
      - cargo clean
      - echo "✓ Clean complete"

  clean-wasm:
    desc: Clean WASM build artifacts
    cmds:
      - echo "Cleaning WASM artifacts..."
      - rm -rf target/{{.WASM_TARGET}}
      - echo "✓ WASM clean complete"

  # ===========================================================================
  # Quality Tasks
  # ===========================================================================

  lint:
    desc: Run clippy linter
    cmds:
      - echo "Running clippy..."
      - cargo clippy --workspace -- -D warnings
      - echo ""
      - echo "✓ Clippy passed"

  format:
    desc: Format code with rustfmt
    cmds:
      - echo "Formatting code..."
      - cargo fmt --all
      - echo ""
      - echo "✓ Code formatted"

  # ===========================================================================
  # Inspection Tasks
  # ===========================================================================

  inspect:
    desc: Inspect WASM component
    deps:
      - build
    cmds:
      - echo "Inspecting WASM component..."
      - wasm-tools component info {{.WASM_BINARY}} || echo "wasm-tools not installed"
      - echo ""
      - wasm-tools component wit {{.WASM_BINARY}} || echo "wasm-tools not installed"

  size:
    desc: Show WASM artifact sizes
    cmds:
      - |
        echo "Binary Sizes:"
        echo "─────────────────────────────────"
        if [ -f "{{.WASM_BINARY}}" ]; then
          WASM_SIZE=$(stat -f%z "{{.WASM_BINARY}}" 2>/dev/null || stat -c%s "{{.WASM_BINARY}}" 2>/dev/null || echo "?")
          echo "  WASM:   $WASM_SIZE bytes"
        else
          echo "  WASM:   not built"
        fi
        echo "─────────────────────────────────"

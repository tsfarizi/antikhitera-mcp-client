# Taskfile for Antikythera MCP Framework
# Usage: task <task-name>
# Docs: https://taskfile.dev

version: '3'

silent: true

dotenv:
  - config/.env

vars:
  WASM_TARGET: wasm32-wasip1
  WASM_BINARY: target/{{.WASM_TARGET}}/release/antikythera_sdk.wasm
  CLI_BINARY: target/release/antikythera{{exeExt}}
  APP_CONFIG: app.pc

tasks:

  # ===========================================================================
  # Default Task - Show Help
  # ===========================================================================
  default:
    desc: Show available tasks
    cmds:
      - |
        echo "Antikythera MCP Framework - Available Tasks"
        echo ""
        echo "  task run           - Run CLI as WASM FFI host harness"
        echo "  task run-wasm      - Run CLI as WASM FFI host harness"
        echo "  task build         - Build WASM component"
        echo "  task build-wasm-harness - Build WASM artifact for FFI host harness"
        echo "  task build-cli     - Build native CLI binary"
        echo "  task build-all     - Build both CLI and WASM"
        echo "  task wit           - Generate WIT from Rust code"
        echo "  task clean         - Clean all build artifacts"
        echo "  task clean-wasm    - Clean WASM build artifacts"
        echo "  task clean-cli     - Clean CLI build artifacts"
        echo "  task check         - Check code without building"
        echo "  task check-wasm    - Check WASM compilation"
        echo "  task test          - Run all tests"
        echo "  task test-sdk      - Run SDK tests"
        echo "  task test-ffi      - Run FFI tests"
        echo "  task test-component - Run component tests"
        echo "  task lint          - Run clippy linter"
        echo "  task format        - Format code with rustfmt"
        echo "  task inspect       - Inspect WASM component"
        echo "  task size          - Show binary sizes"
        echo ""

  # ===========================================================================
  # Build Tasks
  # ===========================================================================

  build:
    desc: Build WASM component
    deps:
      - wit
    cmds:
      - echo "Building WASM component..."
      - cargo component build --target {{.WASM_TARGET}} --release
      - echo ""
      - 'echo "OK WASM component built: {{.WASM_BINARY}}"'
      - task: size

  build-wasm-harness:
    desc: Build WASM artifact for CLI harness (component lane)
    deps:
      - wit
    cmds:
      - echo "Building WASM harness artifact..."
      - cargo component build -p antikythera-sdk --target {{.WASM_TARGET}} --release --no-default-features --features component
      - echo ""
      - 'echo "OK WASM harness artifact built: {{.WASM_BINARY}}"'
      - task: size

  build-cli:
    desc: Build native CLI binary
    deps:
      - wit
    cmds:
      - echo "Building CLI binary..."
      - cargo build -p antikythera-cli --release
      - echo ""
      - 'echo "OK CLI binary built: {{.CLI_BINARY}}"'
      - task: size

  build-all:
    desc: Build WASM component and optional native CLI binary
    cmds:
      - task: build
      - task: build-cli

  wit:
    desc: Generate WIT from Rust code
    cmds:
      - echo "Generating WIT from Rust code..."
      - cargo run -p build-scripts --release -- wit

  # ===========================================================================
  # Run Tasks
  # ===========================================================================

  run:
    desc: Run CLI as WASM FFI host harness (default run path)
    deps:
      - build-wasm-harness
    vars:
      WASM_TASK: '{{default "WASM harness smoke test" .WASM_TASK}}'
    cmds:
      - echo "Running CLI as WASM FFI host harness..."
      - |
        if [ ! -f "{{.APP_CONFIG}}" ]; then
          echo "Config {{.APP_CONFIG}} not found, bootstrapping default config..."
          cargo run -p antikythera-cli --bin antikythera-config -- init
          cargo run -p antikythera-cli --bin antikythera-config -- add-provider local-ollama ollama http://127.0.0.1:11434
          cargo run -p antikythera-cli --bin antikythera-config -- set-model local-ollama llama3.2
        fi
      - 'cargo run -p antikythera-cli -- --mode wasm-harness --wasm {{.WASM_BINARY}} --task "{{.WASM_TASK}}" --stream {{.CLI_ARGS}}'

  run-wasm:
    desc: Alias of run (WASM FFI host harness)
    cmds:
      - task: run

  # ===========================================================================
  # Test Tasks
  # ===========================================================================

  test:
    desc: Run all tests
    deps:
      - wit
    cmds:
      - echo "Running all tests..."
      - cargo test --workspace
      - echo ""
      - echo "✓ All tests passed"

  test-sdk:
    desc: Run SDK tests
    cmds:
      - echo "Running SDK tests..."
      - cargo test -p antikythera-sdk --lib
      - echo ""
      - echo "✓ SDK tests passed"

  test-ffi:
    desc: Run FFI tests
    cmds:
      - echo "Running FFI tests..."
      - cargo test -p antikythera-sdk --lib ffi
      - echo ""
      - echo "✓ FFI tests passed"

  test-component:
    desc: Run component tests
    cmds:
      - echo "Running component tests..."
      - cargo test -p antikythera-sdk --lib component
      - echo ""
      - echo "✓ Component tests passed"

  # ===========================================================================
  # Check Tasks
  # ===========================================================================

  check:
    desc: Check code without building
    deps:
      - wit
    cmds:
      - echo "Checking code..."
      - cargo check --workspace
      - echo ""
      - echo "✓ Code check passed"

  check-wasm:
    desc: Check WASM compilation
    deps:
      - wit
    cmds:
      - echo "Checking WASM compilation..."
      - cargo check -p antikythera-sdk --target {{.WASM_TARGET}}
      - echo ""
      - echo "✓ WASM check passed"

  # ===========================================================================
  # Clean Tasks
  # ===========================================================================

  clean:
    desc: Clean all build artifacts
    cmds:
      - echo "Cleaning all build artifacts..."
      - cargo clean
      - echo "✓ Clean complete"

  clean-wasm:
    desc: Clean WASM build artifacts
    cmds:
      - echo "Cleaning WASM artifacts..."
      - rm -rf target/{{.WASM_TARGET}}
      - echo "✓ WASM clean complete"

  clean-cli:
    desc: Clean CLI build artifacts
    cmds:
      - echo "Cleaning CLI artifacts..."
      - rm -f {{.CLI_BINARY}}
      - echo "✓ CLI clean complete"

  # ===========================================================================
  # Quality Tasks
  # ===========================================================================

  lint:
    desc: Run clippy linter
    cmds:
      - echo "Running clippy..."
      - cargo clippy --workspace -- -D warnings
      - echo ""
      - echo "✓ Clippy passed"

  format:
    desc: Format code with rustfmt
    cmds:
      - echo "Formatting code..."
      - cargo fmt --all
      - echo ""
      - echo "✓ Code formatted"

  # ===========================================================================
  # Inspection Tasks
  # ===========================================================================

  inspect:
    desc: Inspect WASM component
    deps:
      - build
    cmds:
      - echo "Inspecting WASM component..."
      - wasm-tools component info {{.WASM_BINARY}} || echo "wasm-tools not installed"
      - echo ""
      - wasm-tools component wit {{.WASM_BINARY}} || echo "wasm-tools not installed"

  size:
    desc: Show binary sizes
    cmds:
      - |
        echo "Binary Sizes:"
        echo "─────────────────────────────────"
        if [ -f "{{.CLI_BINARY}}" ]; then
          CLI_SIZE=$(stat -f%z "{{.CLI_BINARY}}" 2>/dev/null || stat -c%s "{{.CLI_BINARY}}" 2>/dev/null || echo "?")
          echo "  CLI:    $CLI_SIZE bytes"
        else
          echo "  CLI:    not built"
        fi
        if [ -f "{{.WASM_BINARY}}" ]; then
          WASM_SIZE=$(stat -f%z "{{.WASM_BINARY}}" 2>/dev/null || stat -c%s "{{.WASM_BINARY}}" 2>/dev/null || echo "?")
          echo "  WASM:   $WASM_SIZE bytes"
        else
          echo "  WASM:   not built"
        fi
        echo "─────────────────────────────────"

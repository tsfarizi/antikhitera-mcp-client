name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [ stable, beta ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --verbose

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy (all features)
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Run clippy (native lane - default)
        run: cargo clippy -p antikythera-sdk -- -D warnings
      - name: Run clippy (WASM component lane)
        run: cargo clippy -p antikythera-sdk --no-default-features --features component -- -D warnings

  test-wasm:
    name: WASM Component Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-component
        run: cargo install cargo-component
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM component (debug)
        run: cargo component build -p antikythera-sdk --target wasm32-wasip1 --no-default-features --features component
      - name: Build WASM component (release)
        run: cargo component build -p antikythera-sdk --release --target wasm32-wasip1 --no-default-features --features component

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check documentation build
        run: cargo doc --workspace --no-deps --document-private-items

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-tarpaulin
      - uses: Swatinem/rust-cache@v2
      - name: Generate coverage
        run: cargo tarpaulin --workspace --out Html --output-dir coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/tarpaulin-report.html
        continue-on-error: true
